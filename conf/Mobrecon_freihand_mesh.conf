### 总控配置 ###
task_name = Mobrecon_FreiHand_cudagraph2 # 实验名称(每一个实验建议新建一个conf文件，然后设置不同的task_name)
home_self = /home/wxl/code/SPNet/ # 代码目录位置
model_save_dir = ${home_self}/workdir/checkpoint/${task_name} # 模型存储地址
log_file_dir = ${home_self}/workdir/log/${task_name} # log文件地址
tb_file_dir = ${home_self}/workdir/tb/${task_name} # tensorboard地址

# 测试参数
ckpt_name = best.pth
data_save_dir = ${home_self}/workdir/checkpoint/${task_name}#/home/wxl/dataset/HRNet_predict/DHGA/
# init_from =/home/wxl/code/MYDHGA_recon_new/dhg/dhg/workdir/checkpoint/SPNet_all/best.pth
# load_from=/home/wxl/codeForLYX/dhg224/workdir/checkpoint/20251124_Mobrecon_FreiHand_cudagraph/best_train.pth#${model_save_dir}/${ckpt_name} # 模型加载路径

### 数据 ###
input_size = 128
dataset_root =/home/data/FreiHand_Dataset


mano_path = ${home_self}/template  # MANO模型路径！！！！！

### 模型配置 ###
model_path = mobrecon_ds
model_name = MobRecon_DS

### 训练控制参数 ###
num_epochs=100  # 迭代轮次上限
batchsize_train = 48
batchsize_test = 48
train_dataloader_workers = 8 #训练dataloader workers
eval_dataloader_workers = 8 # 验证dataloader workers
optimizer=adam  # 优化器
learning_rate=0.001  # 学习率[pretrained_parms,new_params]
new_lr_step=10  # 每n个epoch学习率下降
lr_gamma=0.45  # 学习率策略
save_model = True  # 是否储存模型
eval_internal = 2 # 训练多少个epoch验证一次
use_cuda_graph = True

# extra
description = "test only"